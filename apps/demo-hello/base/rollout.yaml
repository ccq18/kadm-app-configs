apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: hello
  namespace: apps
  labels:
    app.kubernetes.io/name: hello
    app.kubernetes.io/part-of: demo-hello
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: hello
  strategy:
    canary:
      maxSurge: 1
      maxUnavailable: 0
      steps:
        - setWeight: 33
        - pause: {}
        - setWeight: 66
        - pause: {}
        - setWeight: 100
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hello
        app.kubernetes.io/part-of: demo-hello
    spec:
      imagePullSecrets:
        - name: ghcr-cred
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: hello
      containers:
        - name: hello
          image: ghcr.io/ccq18/demo-hello:sha-initial
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DB_HOST
              value: "10.120.0.6"
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: hello-db
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hello-db
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: hello-db
                  key: DB_NAME
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 256Mi
